name: Style with air

on:
  push:
    branches: [master]
    paths:
      - '**.R'
      - '**.r'
      - '**.Rmd'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  style:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_PAT: ${{ secrets.PAT_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: master

      - name: Create folder to silence Nix warning
        run: mkdir -p ~/.nix-defexpr/channels

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run Air
        run: nix-shell --quiet -p air-formatter --run "air format ."

      - name: Check for changes
        id: diff
        run: |
          # Air should only create formatting PRs for R/Rmd files. Ignore any
          # unrelated file changes that may be produced by setup tooling.
          changed_files="$RUNNER_TEMP/air-changed-files.txt"
          git ls-files --modified --others --exclude-standard -- '*.R' '*.r' '*.Rmd' '*.rmd' > "$changed_files"

          if [ -s "$changed_files" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if files were reformatted
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="style-air-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Stage the same R/Rmd file set checked above, preserving filenames
          # with spaces and avoiding non-formatting changes such as default.nix.
          changed_files="$RUNNER_TEMP/air-changed-files.txt"
          git ls-files --modified --others --exclude-standard -- '*.R' '*.r' '*.Rmd' '*.rmd' > "$changed_files"
          git add --pathspec-from-file="$changed_files"

          git commit -m "style: format code via air"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "style: format code via air" \
            --body "Automated code formatting by air after a push to master. Auto-merges when CI passes." \
            --base master \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash
